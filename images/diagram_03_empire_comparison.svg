<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-size: 14px; fill: #555; }
      .label { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .value { font-size: 11px; fill: #4b5563; }
      .axis { font-size: 11px; fill: #6b7280; }
      .caption { font-size: 11px; fill: #374151; font-style: italic; }
    </style>
  </defs>

  <!-- Header -->
  <text x="500" y="35" text-anchor="middle" class="title">Conquest vs. Institutional Durability</text>
  <text x="500" y="57" text-anchor="middle" class="subtitle">Size of empire at peak vs. how long the institutions survived the founder</text>

  <!-- Chart frame -->
  <line x1="120" y1="500" x2="900" y2="500" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="120" y1="100" x2="120" y2="500" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Y-axis label -->
  <text x="50" y="300" transform="rotate(-90, 50, 300)" text-anchor="middle" class="axis" style="font-weight:700;">Durability (years institutions survived)</text>

  <!-- Y-axis ticks -->
  <text x="110" y="505" text-anchor="end" class="axis">0</text>
  <text x="110" y="425" text-anchor="end" class="axis">500</text>
  <text x="110" y="345" text-anchor="end" class="axis">1,000</text>
  <text x="110" y="265" text-anchor="end" class="axis">1,500</text>
  <text x="110" y="185" text-anchor="end" class="axis">2,000+</text>

  <line x1="118" y1="425" x2="122" y2="425" stroke="#1a1a1a"/>
  <line x1="118" y1="345" x2="122" y2="345" stroke="#1a1a1a"/>
  <line x1="118" y1="265" x2="122" y2="265" stroke="#1a1a1a"/>
  <line x1="118" y1="185" x2="122" y2="185" stroke="#1a1a1a"/>

  <!-- Alexander bar -->
  <rect x="200" y="470" width="140" height="30" fill="#dc2626" opacity="0.85"/>
  <text x="270" y="520" text-anchor="middle" class="label">Alexander</text>
  <text x="270" y="536" text-anchor="middle" class="value">empire: ~5.2M km²</text>
  <text x="270" y="550" text-anchor="middle" class="value">durability: ~10 yrs</text>
  <text x="270" y="564" text-anchor="middle" class="caption">(split among generals)</text>

  <!-- Mongol bar -->
  <rect x="410" y="455" width="180" height="45" fill="#ea580c" opacity="0.85"/>
  <text x="500" y="520" text-anchor="middle" class="label">Mongol (Genghis Khan)</text>
  <text x="500" y="536" text-anchor="middle" class="value">empire: ~24M km²</text>
  <text x="500" y="550" text-anchor="middle" class="value">durability: ~40 yrs</text>
  <text x="500" y="564" text-anchor="middle" class="caption">(split into khanates)</text>

  <!-- Qin bar (towering) -->
  <rect x="660" y="150" width="160" height="350" fill="#059669" opacity="0.9"/>
  <text x="740" y="520" text-anchor="middle" class="label">Qin Shi Huang</text>
  <text x="740" y="536" text-anchor="middle" class="value">empire: ~4M km²</text>
  <text x="740" y="550" text-anchor="middle" class="value">durability: 2,000+ yrs</text>
  <text x="740" y="564" text-anchor="middle" class="caption">(institutional frame survived dynasty)</text>

  <!-- Annotation callouts -->
  <text x="270" y="465" text-anchor="middle" class="value" style="font-weight:700; fill:#dc2626;">largest in lifetime ✗ durable</text>
  <text x="500" y="450" text-anchor="middle" class="value" style="font-weight:700; fill:#ea580c;">largest ever ✗ durable</text>
  <text x="740" y="140" text-anchor="middle" class="value" style="font-weight:700; fill:#059669;">smaller but durable ✓</text>

  <!-- Bottom caption -->
  <rect x="140" y="590" width="720" height="22" fill="#f3f4f6" rx="4"/>
  <text x="500" y="605" text-anchor="middle" class="caption" style="font-style:normal; font-weight:600;">Conquest is glamorous. Standardization is what survives the funeral.</text>
</svg>
